services:
  beliel:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # Dockploy puede cambiar BELIEL_PORT desde las variables del servicio.
      - "${BELIEL_PORT:-18080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
